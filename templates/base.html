<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Restoration Intake{% endblock %}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231c6e45'/%3E%3Cpath d='M16 6C16 6 9 14.5 9 19a7 7 0 0 0 14 0C23 14.5 16 6 16 6Z' fill='%23fff'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; background: #f4f4f2; color: #1e2226; line-height: 1.55;
         -webkit-font-smoothing: antialiased; }
  header { background: #fff; border-bottom: 1px solid #dde1e5; }
  nav { max-width: 960px; margin: 0 auto; padding: .65rem 1rem;
        display: flex; flex-wrap: wrap; gap: .4rem 1.1rem; align-items: baseline; }
  .brand { font-weight: 700; margin-right: auto; }
  nav a { color: #5b6570; text-decoration: none; font-size: .9rem; padding-bottom: .15rem; }
  nav a.on { color: #1c6e45; font-weight: 600; border-bottom: 2px solid #1c6e45; }
  main { max-width: {% block width %}720px{% endblock %}; margin: 2.5rem auto 0; padding: 0 1rem; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; letter-spacing: -.015em; }
  h2 { font-size: 1.05rem; margin: 1.75rem 0 .6rem; }
  p.sub { margin: 0 0 1.5rem; color: #5b6570; font-size: .9rem; }
  textarea { width: 100%; min-height: 8rem; padding: .75rem; font: inherit;
             border: 1px solid #c6ccd2; border-radius: 8px; resize: vertical; background: #fff; }
  button { margin-top: .75rem; padding: .6rem 1.4rem; font: inherit; font-weight: 600;
           color: #fff; background: #1c6e45; border: 0; border-radius: 8px; cursor: pointer; }
  .card { background: #fff; border: 1px solid #dde1e5; border-radius: 10px;
          padding: 1rem 1.25rem; margin-top: 1.25rem;
          box-shadow: 0 1px 2px rgba(15, 23, 32, .04); }
  .card.error { border-color: #cf3f3f; background: #fdf3f3; }
  dl { display: grid; grid-template-columns: max-content 1fr; gap: .4rem 1.25rem; margin: 0; }
  dt { color: #5b6570; font-size: .85rem; padding-top: .12rem; }
  dd { margin: 0; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
  .badge { display: inline-block; padding: .1rem .55rem; border-radius: 999px;
           font-size: .8rem; font-weight: 500; white-space: nowrap; }
  .badge.human { background: #fde8cd; color: #8a4b00; }
  .badge.auto { background: #d9f2e4; color: #14532d; }
  .badge.rejected { background: #e9ecef; color: #5b6570; }
  .chip { display: inline-block; padding: .1rem .55rem; border-radius: 999px; font-size: .8rem;
          background: #eef1f4; color: #3b4650; white-space: nowrap; }
  .chip.warn { background: #fde8cd; color: #8a4b00; }
  .chip.good { background: #d9f2e4; color: #14532d; }
  .path-chain { display: inline-flex; flex-wrap: wrap; gap: .3rem .4rem; align-items: center; }
  .path-arrow { color: #6f7a84; font-size: .8rem; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85em;
         background: #f6f8fa; padding: .1rem .3rem; border-radius: 4px; }
  pre { overflow-x: auto; background: #f6f8fa; padding: .75rem; border-radius: 8px;
        font-size: .8rem; margin: .4rem 0 0; }
  .muted { color: #6f7a84; }
  .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
                 background: #fff; border: 1px solid #dde1e5; border-radius: 10px;
                 margin-top: 1.25rem; overflow: hidden; }
  .stat { padding: .8rem 1rem .7rem; border-left: 1px solid #eef0f2;
          display: flex; flex-direction: column; gap: .15rem; }
  .stat:first-child { border-left: 0; }
  .stat-label { color: #5b6570; font-size: .75rem; }
  .stat-value { font-size: 1.35rem; font-weight: 600; line-height: 1.15; }
  .stat-sub { color: #6f7a84; font-size: .75rem; }
  .type-mix { margin-top: .6rem; display: flex; flex-wrap: wrap; gap: .4rem;
              align-items: baseline; }
  .type-mix .chip b { font-weight: 600; color: #5b6570; }
  a.chip { text-decoration: none; }
  a.chip:hover { background: #e2e8ec; }
  .chip.on { background: #1c6e45; color: #fff; }
  .chip.on b { color: #d9f2e4; }
  /* admin filter bar */
  .filter-bar { display: flex; flex-wrap: wrap; gap: .6rem .9rem; align-items: flex-end;
                margin-top: 1.25rem; }
  .filter-bar label { display: flex; flex-direction: column; gap: .2rem;
                      color: #5b6570; font-size: .75rem; }
  .filter-bar select, .filter-bar input[type=search] {
    font: inherit; font-size: .85rem; padding: .38rem .55rem;
    border: 1px solid #c6ccd2; border-radius: 8px; background: #fff; color: inherit; }
  .filter-bar .grow { flex: 1 1 14rem; }
  .filter-bar input[type=search] { width: 100%; }
  .filter-bar button { margin-top: 0; padding: .42rem 1rem; font-size: .85rem; }
  .filter-count { color: #5b6570; font-size: .85rem; margin-left: auto; align-self: center;
                  font-variant-numeric: tabular-nums; }
  .filter-count a { color: #1c6e45; }
  td.conf { font-variant-numeric: tabular-nums; }
  .table-wrap { background: #fff; border: 1px solid #dde1e5; border-radius: 10px;
                margin-top: 1.25rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th, td { text-align: left; padding: .55rem .8rem; border-bottom: 1px solid #eef0f2;
           vertical-align: top; }
  td:last-child { min-width: 16rem; }  /* customer text: don't crush it — the wrap scrolls */
  tr:last-child td { border-bottom: 0; }
  th { color: #5b6570; font-weight: 600; font-size: .75rem; text-transform: uppercase;
       letter-spacing: .04em; background: #fafbfb; }
  tbody tr[data-href] { cursor: pointer; }
  tbody tr[data-href]:hover { background: #f6f8f7; }
  tbody tr.escalated { background: #fffaf3; }
  tbody tr.escalated:hover { background: #fdf3e3; }
  td a { color: #1c6e45; text-decoration: none; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: #6f7a84; }
  .step { background: #fff; border: 1px solid #dde1e5; border-radius: 10px;
          padding: .9rem 1.1rem; margin-bottom: .75rem;
          box-shadow: 0 1px 2px rgba(15, 23, 32, .04); }
  .step.safety-tripped { border-left: 4px solid #cf3f3f; }
  .step.safety-clear { border-left: 4px solid #9db8aa; }
  .badge.danger { background: #f8d7d3; color: #7f1d1d; }
  .reply-block { margin-top: .9rem; padding: .75rem 1rem; background: #f2f7f4;
                 border: 1px solid #cfe3d8; border-radius: 8px; }
  .reply-block p { margin: .25rem 0 0; white-space: pre-line; }
  dd.reply { white-space: pre-line; }
  .step-head { display: flex; align-items: baseline; gap: 1rem; }
  .step-head h3 { margin: 0; font-size: .95rem; }
  .step-head .at { margin-left: auto; color: #6f7a84; font-size: .8rem;
                   font-variant-numeric: tabular-nums; }
  /* audit-step field ledger */
  .step-fields { margin-top: .55rem; font-size: .875rem;
                 grid-template-columns: minmax(7rem, max-content) 1fr; }
  .step-fields dt { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                    font-size: .78rem; }
  .pre-line { white-space: pre-line; }
  details.field-json summary { cursor: pointer; color: #5b6570; font-size: .8rem;
                               user-select: none; }
  details.field-json summary:hover { color: #1e2226; }
  details.field-json[open] summary { margin-bottom: .2rem; }
  details.field-json pre { margin: 0; }
  footer { max-width: 960px; margin: 2rem auto 2.5rem; padding: 0 1rem;
           color: #6f7a84; font-size: .8rem; }
  /* escalation queue */
  .esc-card { background: #fff; border: 1px solid #dde1e5; border-radius: 10px;
              padding: .9rem 1.1rem; margin-top: .9rem;
              box-shadow: 0 1px 2px rgba(15, 23, 32, .04); }
  .esc-card.life-safety { border-left: 4px solid #cf3f3f; background: #fffbfa; }
  .esc-head { display: flex; flex-wrap: wrap; gap: .4rem .6rem; align-items: baseline; }
  .esc-head .at { margin-left: auto; color: #6f7a84; font-size: .8rem;
                  font-variant-numeric: tabular-nums; }
  .esc-text { margin: .55rem 0 .15rem; }
  .esc-meta { margin: 0; color: #5b6570; font-size: .85rem; }
  .esc-actions { display: flex; flex-wrap: wrap; gap: .5rem .75rem; margin-top: .75rem;
                 align-items: center; }
  .esc-actions form { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
                      margin: 0; }
  .esc-actions form.resolve { flex: 1 1 26rem; }
  .esc-actions select, .esc-actions input[type=text] {
    font: inherit; font-size: .85rem; padding: .4rem .55rem;
    border: 1px solid #c6ccd2; border-radius: 8px; background: #fff; }
  .esc-actions input[type=text] { flex: 1 1 12rem; min-width: 9rem; }
  .esc-actions button { margin-top: 0; padding: .42rem 1rem; font-size: .85rem; }
  button.secondary { background: #fff; color: #1e2226; border: 1px solid #c6ccd2; }
  .chip.ack { background: #dbeafe; color: #1e3a8a; }
  .chip.mini { font-size: .72rem; padding: .05rem .45rem; color: #5b6570; }
  .nav-count { display: inline-block; min-width: 1.15rem; padding: 0 .3rem;
               text-align: center; border-radius: 999px; background: #eef1f4;
               color: #3b4650; font-size: .72rem; font-weight: 600; line-height: 1.5;
               font-variant-numeric: tabular-nums; }
  .nav-count.danger { background: #f8d7d3; color: #7f1d1d; }
  .conf-meter { display: inline-flex; align-items: center; gap: .45rem;
                font-variant-numeric: tabular-nums; }
  .conf-meter .track { width: 44px; height: 5px; border-radius: 999px;
                       background: #e4e8eb; overflow: hidden; flex: none; }
  .conf-meter .fill { display: block; height: 100%; border-radius: 999px;
                      background: #1c6e45; }
  .badge.danger.pulse { animation: esc-pulse 1.6s ease-in-out infinite; }
  @keyframes esc-pulse { 50% { opacity: .55; } }
  .notice { margin-top: 1rem; padding: .6rem 1rem; border-radius: 8px; font-size: .9rem; }
  .notice.ok { background: #d9f2e4; color: #14532d; border: 1px solid #b7e2cb; }
  .notice.warn { background: #fde8cd; color: #8a4b00; border: 1px solid #f3d3a1; }
  a:focus-visible, button:focus-visible, select:focus-visible, input:focus-visible,
  textarea:focus-visible, summary:focus-visible {
    outline: 2px solid #1c6e45; outline-offset: 2px; }
  /* customer intake */
  .emergency { margin: 0 0 1.6rem; }
  .intake-label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; }
  .hint { color: #6f7a84; font-size: .8rem; margin: .45rem 0 0; }
  ol.next-steps { list-style: none; counter-reset: step; margin: 1.9rem 0 0; padding: 0;
                  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
                  gap: .75rem; }
  .next-steps li { counter-increment: step; background: #fff; border: 1px solid #dde1e5;
                   border-radius: 10px; padding: .75rem .9rem .7rem; font-size: .85rem;
                   color: #5b6570; }
  .next-steps li::before { content: counter(step); display: inline-flex; width: 1.35rem;
                           height: 1.35rem; margin: 0 .5rem .3rem 0; align-items: center;
                           justify-content: center; border-radius: 999px; background: #d9f2e4;
                           color: #14532d; font-weight: 600; font-size: .78rem; }
  .next-steps b { color: #1e2226; }
  .result-card h2 { margin: 0; }
  .ref-line { margin: .35rem 0 1rem; color: #5b6570; font-size: .9rem; }
  code.ref { font-size: .95rem; background: #f2f7f4; border: 1px solid #cfe3d8;
             padding: .15rem .5rem; }
  @media (prefers-reduced-motion: reduce) {
    .badge.danger.pulse { animation: none; }
  }
</style>
</head>
<body>
<header>
  <nav>
    <span class="brand">Restoration Intake</span>
    <a href="/" {% if active == 'intake' %}class="on"{% endif %}>Customer intake</a>
    <a href="/admin" {% if active == 'admin' %}class="on"{% endif %}>Admin</a>
    <a href="/admin/queue" {% if active == 'queue' %}class="on"{% endif %}>Queue{% if nav_queue %}
      <span class="nav-count{% if nav_queue_danger %} danger{% endif %}"
            title="{{ nav_queue }} unresolved escalation{{ '' if nav_queue == 1 else 's' }}{% if nav_queue_danger %}, life-safety among them{% endif %}">{{ nav_queue }}</span>{% endif %}</a>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>{% block footer %}Every request is processed by the intake pipeline and recorded
step by step in the audit trail — the admin view reads straight from it.{% endblock %}</footer>
</body>
</html>
