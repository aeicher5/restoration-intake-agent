# Railway config-as-code for the web layer. Full steps + env vars: DEPLOY.md.
#
# The builder is pinned to Nixpacks on purpose: the repo's Dockerfile is the
# offline-selftest image (agent.py + the anthropic SDK only — no fastapi or
# uvicorn) and Railway would auto-pick it otherwise. Nixpacks detects Python
# (pinned by runtime.txt) and installs requirements.txt.

[build]
builder = "NIXPACKS"

[deploy]
# web.py binds 127.0.0.1 when run directly, so uvicorn is the entrypoint:
# 0.0.0.0 plus the platform-injected $PORT.
startCommand = "uvicorn web:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# The audit store is a single append-only JSONL file on local disk: run
# exactly one replica until it moves to Postgres (see ARCHITECTURE.md).
numReplicas = 1
